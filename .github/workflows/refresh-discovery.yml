name: Refresh paper discovery

on:
  schedule:
    # 11:30 Asia/Shanghai, Monday through Friday.
    - cron: "30 3 * * 1-5"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: discovery-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh discovery snapshot
        run: npm run refresh:discovery
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}

      - name: Verify snapshot and site
        run: |
          npm run check
          npm run test
          npm run build

      - name: Detect snapshot changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- 'src/data/generated/discovery*.json'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure main did not move during refresh
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git fetch origin main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"

      - name: Commit refreshed snapshot
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- 'src/data/generated/discovery*.json'
          git commit -m "content: refresh paper discovery"
          git push origin HEAD:main

      - name: Deploy refreshed site
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
